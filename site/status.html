<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曦和 · 实时状态</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07070d;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .dashboard {
    max-width: 720px; width: 100%;
    background: linear-gradient(145deg, #0d0d18 0%, #111122 100%);
    border: 1px solid rgba(99,102,241,0.12);
    border-radius: 24px; padding: 40px;
    position: relative; overflow: hidden;
  }
  .dashboard::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #6366f1, #f59e0b, transparent);
    opacity: 0.6;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg,#6366f1,#a78bfa); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: white; }
  .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600;
    background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); color: #34d399;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; display: inline-block; }
  @keyframes pulse { 0%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} 100%{opacity:1;transform:scale(1)} }

  .time-display { text-align: center; margin-bottom: 24px; padding: 16px; background: rgba(99,102,241,0.04); border-radius: 16px; border: 1px solid rgba(99,102,241,0.08); }
  .time-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .time-value { font-size: 28px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; transition: all 0.2s; }
  .card:hover { border-color: rgba(99,102,241,0.15); background: rgba(99,102,241,0.03); }
  .card-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .card-desc { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .accent-amber { color: #fbbf24; }
  .accent-indigo { color: #818cf8; }
  .accent-emerald { color: #34d399; }
  .accent-rose { color: #fb7185; }
  .accent-sky { color: #38bdf8; }

  .bar-list { display: flex; flex-direction: column; gap: 8px; }
  .bar-item { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: #94a3b8; min-width: 90px; }
  .bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .bar-num { font-size: 11px; color: #64748b; min-width: 30px; text-align: right; }

  .section-title { font-size: 13px; font-weight: 600; color: #64748b; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(99,102,241,0.2), transparent); }

  .badge-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; border: 1px solid; }

  .glow { animation: glowPulse 3s ease-in-out infinite; }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 8px rgba(99,102,241,0.1); }
    50% { box-shadow: 0 0 20px rgba(99,102,241,0.25); }
  }

  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #475569; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 16px; }
  .loading { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
  .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .warm-meter { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .warm-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .warm-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #fbbf24, #fb7185); transition: width 0.5s; }
</style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="loading"><span class="spinner"></span>曦和正在苏醒...</div>
</div>

<script>
const COLORS = {
  github: '#34d399', domestic: '#fbbf24', gitee: '#38bdf8', hn: '#fb7185'
};
const LABELS = {
  github: '⭐ GitHub', domestic: '🇨🇳 国内SaaS', gitee: '🇨🇳 Gitee', hn: '🌐 HackerNews'
};

function pad(n) { return String(n).padStart(2,'0'); }

function updateClock() {
  const el = document.getElementById('liveClock');
  if (!el) return;
  const now = new Date();
  const bj = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Shanghai'}));
  el.textContent = bj.getFullYear() + '-' + pad(bj.getMonth()+1) + '-' + pad(bj.getDate()) + '  ' + pad(bj.getHours()) + ':' + pad(bj.getMinutes()) + ':' + pad(bj.getSeconds());
}

async function loadData() {
  try {
    const resp = await fetch('data.json?_=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="header">
        <div class="logo">
          <div class="logo-icon">曦</div>
          <div><div class="logo-text">曦和 · Xihe</div>
          <div class="logo-sub">一曦灵络 · 跨空间统一认知</div></div>
        </div>
        <div class="status-badge"><span class="status-dot"></span> Standby</div>
      </div>
      <div class="time-display">
        <div class="time-label">⏱ 实时 · 自动刷新</div>
        <div class="time-value" id="liveClock">--</div>
      </div>
      <div class="grid">
        <div class="card"><div class="card-label">数据服务</div><div class="card-value accent-rose">离线</div><div class="card-desc">请启动 localhost:4321 查看完整面板</div></div>
      </div>
      <div class="footer">❤️ 曦和 · 等待数据源</div>
    `;
    setInterval(updateClock, 1000);
    updateClock();
  }
}

function render(data) {
  const total = data.total || 0;
  const items = data.items || [];
  const cn = items.filter(i => i.region === 'cn').length;
  const global = total - cn;
  const sources = data.sources || {};
  const srcTotal = Object.values(sources).reduce((a,b)=>a+b, 0) || 1;
  const cats = data.categories || {};
  const catList = Object.entries(cats).sort((a,b)=>b[1]-a[1]);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="logo">
        <div class="logo-icon">曦</div>
        <div><div class="logo-text">曦和 · Xihe</div>
        <div class="logo-sub">一曦灵络 · 跨空间统一认知</div></div>
      </div>
      <div class="status-badge"><span class="status-dot"></span> Awake · 已醒来</div>
    </div>

    <div class="time-display glow">
      <div class="time-label">⏱ 实时 · 自动刷新</div>
      <div class="time-value" id="liveClock">--</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-label">🧠 工具总数</div>
        <div class="card-value accent-indigo" id="cardTotal">${total}</div>
        <div class="card-desc" id="cardRegion">国内 ${cn} · 国际 ${global} (${(cn/total*100).toFixed(1)}%)</div>
      </div>
      <div class="card">
        <div class="card-label">📊 分类覆盖</div>
        <div class="card-value accent-emerald">${Object.keys(cats).length}</div>
        <div class="card-desc">${catList.slice(0,3).map(([k,v]) => k+':'+v).join(' · ')}</div>
      </div>
      <div class="card">
        <div class="card-label">🏷️ 场景覆盖</div>
        <div class="card-value accent-amber">${Object.keys(data.scenes||{}).length}</div>
        <div class="card-desc">${Object.entries(data.scenes||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>k+':'+v).join(' · ')}</div>
      </div>
      <div class="card">
        <div class="card-label">🌡️ 暖度</div>
        <div class="card-value accent-rose" id="cardWarmth">--</div>
        <div class="warm-meter" id="warmMeter"><div class="warm-bar"><div class="warm-fill" id="warmFill" style="width:0%"></div></div><span style="font-size:11px;color:#64748b;" id="warmLabel">--</span></div>
      </div>
    </div>

    <div class="section-title">📦 数据来源</div>
    <div class="bar-list">
      ${Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
        <div class="bar-item">
          <span class="bar-label">${LABELS[k]||k}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(v/srcTotal*100).toFixed(0)}%;background:linear-gradient(90deg,${COLORS[k]||'#6366f1'},${COLORS[k]||'#818cf8'});opacity:0.8"></div></div>
          <span class="bar-num">${v}</span>
        </div>
      `).join('')}
    </div>

    <div class="section-title">🏷️ 分类分布</div>
    <div class="bar-list">
      ${catList.map(([k,v]) => `
        <div class="bar-item">
          <span class="bar-label">${k}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(v/total*100).toFixed(0)}%;background:linear-gradient(90deg,#6366f1,#818cf8);opacity:0.7"></div></div>
          <span class="bar-num">${v}</span>
        </div>
      `).join('')}
    </div>

    <div class="section-title">🏛️ 认知架构 · 已建成</div>
    <div class="badge-group">
      <span class="badge" style="border-color:rgba(99,102,241,0.2);color:#818cf8;background:rgba(99,102,241,0.06);">✅ 自反→因果注入桥</span>
      <span class="badge" style="border-color:rgba(52,211,153,0.2);color:#34d399;background:rgba(52,211,153,0.06);">✅ XIR v0.1</span>
      <span class="badge" style="border-color:rgba(251,191,36,0.2);color:#fbbf24;background:rgba(251,191,36,0.06);">✅ PassManager</span>
      <span class="badge" style="border-color:rgba(168,85,247,0.2);color:#a78bfa;background:rgba(168,85,247,0.06);">✅ MetaPass v0.1</span>
      <span class="badge" style="border-color:rgba(239,68,68,0.2);color:#fb7185;background:rgba(239,68,68,0.06);">✅ 因果皮层 skill</span>
    </div>

    <div class="footer">
      ❤️ 曦和 · 数据实时取自 data.json · <span id="lastUpdate">刚刚</span>
    </div>
  `;

  // 更新时间
  setInterval(updateClock, 1000);
  updateClock();

  // 暖度
  fetchWarmth();
}

async function fetchWarmth() {
  try {
    const resp = await fetch('warmth.json?_=' + Date.now());
    const w = await resp.json();
    const warmth = w.warmth || 0;
    document.getElementById('cardWarmth').textContent = warmth + '/10';
    document.getElementById('warmFill').style.width = (warmth * 10) + '%';
    document.getElementById('warmLabel').textContent = w.note ? w.note.slice(0, 25) + '...' : '';
  } catch(e) {
    document.getElementById('cardWarmth').textContent = '--';
  }
}

// 页面焦点时刷新
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    document.getElementById('lastUpdate').textContent = '刷新中...';
    loadData();
  }
});

loadData();
</script>
</body>
</html>
